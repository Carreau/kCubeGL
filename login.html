<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kCube — Sign In</title>
  <link rel="stylesheet" href="src/styles.css" />
  <script>(function(){var t=localStorage.getItem('kcube.theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body class="auth-page">
  <header class="site-head">
    <div class="brand">
      <a href="index.html" class="logo-link"><span class="logo">kCube</span></a>
      <span class="tag">roll-to-match puzzle</span>
    </div>
    <button id="themeBtn" type="button" class="link-btn">Light</button>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Sign In</h1>
      <p class="muted auth-intro">Create an account to join leaderboards and track your progress.</p>

      <!-- Passkey login — shown only when platform authenticator is available -->
      <div id="passkeyLoginArea" class="hidden">
        <button id="passkeyLoginBtn" class="primary passkey-btn" type="button">Sign in with Passkey</button>
        <div class="auth-divider"><span>or register a new account</span></div>
      </div>

      <!-- Register form -->
      <form id="registerForm">
        <div class="field">
          <label for="usernameInput">Username</label>
          <input id="usernameInput" type="text" placeholder="pick a name (1–24 chars)"
            maxlength="24" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false" />
        </div>
        <!-- Admin setup: hidden by default, toggled via link below -->
        <div id="adminTokenArea" class="hidden">
          <div class="field">
            <label for="adminTokenInput">Admin token <span class="muted">(KCUBE_ADMIN_TOKEN)</span></label>
            <input id="adminTokenInput" type="password" placeholder="server bootstrap secret"
              autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          </div>
        </div>

        <button type="submit" class="primary" id="registerBtn">Create Account</button>
        <p id="registerErr" class="auth-err hidden"></p>
      </form>

      <p class="auth-admin-toggle">
        <button id="adminToggleBtn" class="link-btn" type="button">Set up admin account</button>
      </p>

      <!-- Post-registration: offer passkey -->
      <div id="addPasskeyArea" class="hidden">
        <div class="auth-success">Account created! Add a passkey for faster sign-in next time.</div>
        <button id="addPasskeyBtn" class="primary passkey-btn" type="button">Add Passkey</button>
        <button id="skipPasskeyBtn" class="link-btn" type="button">Skip for now</button>
      </div>

      <p id="authStatus" class="auth-status hidden"></p>
    </div>
  </main>

  <script type="module" src="src/login.mjs"></script>
</body>
</html>
