<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://www.gravatar.com data:; connect-src 'self'" />
  <title>kCube — Admin</title>
  <!-- Render-blocking, before the stylesheet: applies the theme pre-paint -->
  <script src="src/theme-init.js"></script>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body class="auth-page">
  <header class="site-head">
    <div class="brand">
      <a href="index.html" class="logo-link"><span class="logo">kCube</span></a>
      <span class="tag">admin</span>
    </div>
    <div class="head-right">
      <button id="themeBtn" type="button" class="link-btn">Light</button>
      <div id="account" class="account"></div>
    </div>
  </header>

  <main class="admin-main landing">
    <section class="hero">
      <h1>Admin</h1>
    </section>

    <section class="admin-section">
      <h2>Users</h2>
      <div id="userTableWrap">
        <p class="muted">Loading…</p>
      </div>
    </section>

    <section class="admin-section">
      <h2>Featured puzzles</h2>
      <p class="muted">
        Pin puzzles to feature them first on the landing page, and order them
        here. Unpinned puzzles follow in the catalogue's natural order.
      </p>
      <div id="puzzleAdminWrap">
        <p class="muted">Loading…</p>
      </div>
    </section>
  </main>

  <script type="module" src="src/admin.mjs"></script>
</body>
</html>
