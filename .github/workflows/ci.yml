name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node ≥ 22.5 — the backend uses the built-in node:sqlite module.
          node-version: 22

      - name: Syntax check
        run: npm run check

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Tests (API + headless smoke)
        run: npm test
