<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>kCube</title>
  <link rel="stylesheet" href="src/styles.css" />
  <!-- Three.js loaded as an ES module from a CDN (runs in the player's browser) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-row">
        <span class="badge">Level <b id="level">1</b></span>
        <span class="badge">Moves <b id="moves">0</b></span>
        <span class="badge">Cubes <b id="cubes">0</b></span>
      </div>
    </div>

    <!-- Instructions -->
    <div id="help">
      <b>Arrow keys</b> roll the selected cube into an empty cell, or re-select an
      adjacent cube. Make every cube show the <span id="help-target">same</span>
      colour on top before you run out of moves.
      <div class="keys">↑ ↓ ← → &nbsp;·&nbsp; <b>R</b> retry &nbsp;·&nbsp; <b>Enter</b> next</div>
    </div>

    <!-- Center overlay for win / fail messages -->
    <div id="overlay" class="hidden">
      <div class="panel">
        <h1 id="overlay-title">kCube</h1>
        <p id="overlay-body"></p>
        <button id="overlay-btn">Play</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
