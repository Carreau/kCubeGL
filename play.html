<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>kCube — play</title>
  <link rel="stylesheet" href="src/styles.css" />
  <!-- Three.js loaded as an ES module from a CDN (runs in the player's browser) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <!-- Top-left: back to the level picker + who's playing -->
    <div id="topbar">
      <a class="link-btn" href="index.html">← Levels</a>
      <span class="who">playing as <b id="user">guest</b></span>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-row">
        <span class="badge">Level <b id="level">1</b></span>
        <span class="badge">Moves <b id="moves">0</b></span>
        <button id="infoBtn" type="button" class="info-btn" title="Show info">ⓘ</button>
      </div>
      <div class="hud-row tools">
        <button id="solveBtn" type="button">Show solution</button>
        <button id="menuBtn" type="button">Levels</button>
      </div>
    </div>

    <!-- Info Panel (hidden by default) -->
    <div id="infoPanel" class="info-panel hidden">
      <div class="info-content">
        <div class="info-section">
          <h3>Objective</h3>
          <p>Make every cube show the <span id="help-target">same</span> colour on top <b>and</b> form one connected block (touching N/S/E/W).</p>
        </div>
        <div class="info-row">
          <div class="info-stat">
            <span class="label">Cubes</span>
            <span class="value" id="info-cubes">0</span>
          </div>
          <div class="info-stat">
            <span class="label">Best</span>
            <span class="value" id="info-best">–</span>
          </div>
          <div class="info-stat">
            <span class="label">World</span>
            <span class="value" id="info-world">–</span>
          </div>
        </div>
        <div class="info-section">
          <h3>Controls</h3>
          <div class="control-keys">
            <div class="key-row"><span class="key">↑ ↓ ← →</span> <span class="desc">Roll cube</span></div>
            <div class="key-row"><span class="key">Q/E</span> <span class="desc">Rotate view</span></div>
            <div class="key-row"><span class="key">R</span> <span class="desc">Retry</span></div>
            <div class="key-row"><span class="key">S</span> <span class="desc">Solution</span></div>
            <div class="key-row"><span class="key">M</span> <span class="desc">Levels</span></div>
            <div class="key-row"><span class="key">Enter</span> <span class="desc">Next</span></div>
          </div>
        </div>
      </div>
      <button id="infoCloseBtn" type="button" class="info-close">✕</button>
    </div>

    <!-- Instructions (hidden by default) -->
    <div id="help" class="hidden"></div>

    <!-- Center overlay for win / fail messages -->
    <div id="overlay" class="hidden">
      <div class="panel">
        <h1 id="overlay-title">kCube</h1>
        <p id="overlay-body"></p>
        <button id="overlay-btn">Play</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
